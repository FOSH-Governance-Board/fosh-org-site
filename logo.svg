<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Pareto frontier curve: 180° rotation — arcs upward toward the ideal point -->
  <path d="M 70,10 C 45,10 10,45 10,70"
        fill="none"
        stroke="#1E3A5F"
        stroke-width="4.5"
        stroke-linecap="round"/>
  <!-- A plan's position on the frontier -->
  <circle cx="31" cy="31" r="5.5" fill="#0B7A8A"/>
</svg>
