<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank you — FOSH</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .thanks-page {
      min-height: calc(100vh - 120px);
      display: flex;
      align-items: center;
      background: var(--bg-white);
    }
    .thanks-page .container {
      text-align: center;
      padding-top: var(--space-xl);
      padding-bottom: var(--space-xl);
    }
    .thanks-page h2 {
      margin-bottom: var(--space-sm);
    }
    .thanks-page p {
      margin-bottom: var(--space-lg);
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">
      <img src="logo.svg" alt="FOSH" class="nav-logo-mark">
      <div class="nav-logo-text">
        <span class="nav-logo-name">FOSH</span>
        <span class="nav-logo-sub">Governance Board</span>
      </div>
    </a>
  </nav>

  <div class="thanks-page">
    <div class="container">
      <h2>Thank you.</h2>
      <p>We received your submission and will be in touch.</p>
      <a href="/" class="btn btn-primary">Return to fosh.org</a>
    </div>
  </div>

  <footer>
    <div class="container">
      <p class="footer-legal">© 2026 FOSH Governance Board</p>
    </div>
  </footer>

</body>
</html>
